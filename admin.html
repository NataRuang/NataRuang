<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Dashboard Admin — NataRuang</title>
  <link rel="icon" href="/icons/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body class="bg-charcoal-50 dark:bg-charcoal-950 text-charcoal-900 dark:text-charcoal-100 font-sans antialiased">

  <!-- Sidebar (desktop) + Header -->
  <div class="flex h-screen overflow-hidden">

    <!-- ── Sidebar ── -->
    <aside id="sidebar"
      class="w-60 flex-shrink-0 bg-charcoal-950 text-charcoal-300 flex flex-col fixed inset-y-0 left-0 z-50
             transform -translate-x-full lg:translate-x-0 transition-transform duration-300">

      <div class="h-16 flex items-center px-5 border-b border-charcoal-800">
        <span class="font-serif text-lg text-white">Nata<span class="text-wood-400">Ruang Admin</span></span>
      </div>

      <nav class="flex-1 overflow-y-auto p-4 space-y-1">
        <button class="sidebar-btn active" data-tab="dashboard">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Dashboard
        </button>
        <button class="sidebar-btn" data-tab="produk">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
          </svg>
          Produk
        </button>
        <button class="sidebar-btn" data-tab="kategori">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
          </svg>
          Kategori
        </button>
        <button class="sidebar-btn" data-tab="pesanan">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          Pesanan
          <span id="badge-pesanan" class="ml-auto bg-amber-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
        </button>
        <button class="sidebar-btn" data-tab="pembayaran">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
          </svg>
          Pembayaran
        </button>
        <button class="sidebar-btn" data-tab="ongkir">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          Ongkos Kirim
        </button>
        <button class="sidebar-btn" data-tab="chatbot">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          Chatbot FAQ
        </button>
        <button class="sidebar-btn" data-tab="testimoni">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
          </svg>
          Testimoni
        </button>
        <button class="sidebar-btn" data-tab="laporan">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          Laporan
        </button>
        <button class="sidebar-btn" data-tab="pengaturan">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Pengaturan
        </button>
      </nav>

      <div class="p-4 border-t border-charcoal-800">
        <button id="btn-logout"
          class="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-sm text-charcoal-400 hover:text-red-400 hover:bg-red-900/10 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Keluar
        </button>
      </div>
    </aside>

    <!-- ── Main area ── -->
    <div class="flex-1 flex flex-col min-w-0 lg:ml-60">

      <!-- Top bar -->
      <header class="h-16 bg-white dark:bg-charcoal-900 border-b border-charcoal-100 dark:border-charcoal-800 flex items-center px-4 gap-3 flex-shrink-0">
        <button id="btn-sidebar-toggle" class="lg:hidden p-2 rounded-lg hover:bg-charcoal-100 dark:hover:bg-charcoal-800" aria-label="Buka menu">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <h1 id="page-title" class="font-semibold text-lg flex-1">Dashboard</h1>
        <a href="/" target="_blank" rel="noopener"
          class="text-xs text-charcoal-400 hover:text-wood-600 transition flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
          Lihat toko
        </a>
        <button id="btn-darkmode" class="p-2 rounded-lg hover:bg-charcoal-100 dark:hover:bg-charcoal-800 transition" aria-label="Toggle dark mode">
          <svg class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707"/>
          </svg>
          <svg class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
      </header>

      <!-- Tab content area -->
      <main id="tab-content" class="flex-1 overflow-y-auto p-4 sm:p-6">

        <!-- ══ TAB: DASHBOARD ══ -->
        <div id="tab-dashboard" class="tab-panel">

          <!-- Metric cards -->
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="card-metric">
              <p class="metric-label">Total Produk</p>
              <p class="metric-value" id="m-produk">—</p>
            </div>
            <div class="card-metric">
              <p class="metric-label">Total Pesanan</p>
              <p class="metric-value" id="m-pesanan">—</p>
            </div>
            <div class="card-metric">
              <p class="metric-label">Pendapatan Bulan Ini</p>
              <p class="metric-value text-wood-600" id="m-pendapatan">—</p>
            </div>
            <div class="card-metric bg-amber-50 dark:bg-amber-900/10 border-amber-200 dark:border-amber-800">
              <p class="metric-label">Menunggu Verifikasi</p>
              <p class="metric-value text-amber-600" id="m-verifikasi">—</p>
            </div>
          </div>

          <!-- Grafik tren penjualan -->
          <div class="bg-white dark:bg-charcoal-900 rounded-2xl p-5 shadow-card mb-6">
            <div class="flex items-center justify-between mb-4">
              <h2 class="font-semibold text-sm">Tren Penjualan 30 Hari</h2>
              <div class="flex gap-2 text-xs">
                <button class="chart-period-btn active" data-period="harian">Harian</button>
                <button class="chart-period-btn" data-period="bulanan">Bulanan</button>
              </div>
            </div>
            <div class="h-56">
              <canvas id="chart-penjualan"></canvas>
            </div>
          </div>

          <!-- Dua kolom: terlaris & paling dilihat -->
          <div class="grid md:grid-cols-2 gap-5 mb-6">
            <div class="bg-white dark:bg-charcoal-900 rounded-2xl p-5 shadow-card">
              <h2 class="font-semibold text-sm mb-4">Produk Terlaris (30 hari)</h2>
              <div id="list-terlaris" class="space-y-3">
                <div class="animate-skeleton bg-charcoal-100 dark:bg-charcoal-800 rounded-xl h-10"></div>
                <div class="animate-skeleton bg-charcoal-100 dark:bg-charcoal-800 rounded-xl h-10"></div>
                <div class="animate-skeleton bg-charcoal-100 dark:bg-charcoal-800 rounded-xl h-10"></div>
              </div>
            </div>
            <div class="bg-white dark:bg-charcoal-900 rounded-2xl p-5 shadow-card">
              <h2 class="font-semibold text-sm mb-4">Produk Paling Dilihat (7 hari)</h2>
              <div id="list-dilihat" class="space-y-3">
                <div class="animate-skeleton bg-charcoal-100 dark:bg-charcoal-800 rounded-xl h-10"></div>
                <div class="animate-skeleton bg-charcoal-100 dark:bg-charcoal-800 rounded-xl h-10"></div>
                <div class="animate-skeleton bg-charcoal-100 dark:bg-charcoal-800 rounded-xl h-10"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- ══ TAB: PRODUK ══ -->
        <div id="tab-produk" class="tab-panel hidden">
          <div class="flex flex-wrap items-center gap-3 mb-5">
            <input id="search-produk" type="search" placeholder="Cari produk..."
              class="input-field flex-1 min-w-40">
            <button id="btn-tambah-produk" class="btn-primary px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Tambah Produk
            </button>
          </div>
          <div id="tbl-produk" class="bg-white dark:bg-charcoal-900 rounded-2xl shadow-card overflow-hidden">
            <div class="animate-skeleton bg-charcoal-100 dark:bg-charcoal-800 h-64 rounded-2xl"></div>
          </div>
          <div id="paginasi-produk" class="flex justify-center gap-2 mt-4"></div>
        </div>

        <!-- ══ TAB: KATEGORI ══ -->
        <div id="tab-kategori" class="tab-panel hidden">
          <div class="flex justify-end mb-5">
            <button id="btn-tambah-kategori" class="btn-primary px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Tambah Kategori
            </button>
          </div>
          <div id="tbl-kategori" class="bg-white dark:bg-charcoal-900 rounded-2xl shadow-card overflow-hidden">
            <div class="animate-skeleton bg-charcoal-100 dark:bg-charcoal-800 h-48 rounded-2xl"></div>
          </div>
        </div>

        <!-- ══ TAB: PESANAN ══ -->
        <div id="tab-pesanan" class="tab-panel hidden">
          <div class="flex flex-wrap gap-2 mb-5">
            <input id="search-pesanan" type="search" placeholder="Cari invoice / nama / WA..."
              class="input-field flex-1 min-w-40">
            <select id="filter-status-pesanan" class="input-field min-w-36">
              <option value="">Semua status</option>
              <option value="menunggu_pembayaran">Menunggu Pembayaran</option>
              <option value="menunggu_verifikasi">Menunggu Verifikasi</option>
              <option value="lunas">Lunas</option>
              <option value="dikirim">Dikirim</option>
              <option value="selesai">Selesai</option>
              <option value="ditolak">Ditolak</option>
              <option value="dibatalkan">Dibatalkan</option>
            </select>
          </div>
          <div id="tbl-pesanan" class="bg-white dark:bg-charcoal-900 rounded-2xl shadow-card overflow-hidden">
            <div class="animate-skeleton bg-charcoal-100 dark:bg-charcoal-800 h-64 rounded-2xl"></div>
          </div>
          <div id="paginasi-pesanan" class="flex justify-center gap-2 mt-4"></div>
        </div>

        <!-- ══ TAB: PEMBAYARAN ══ -->
        <div id="tab-pembayaran" class="tab-panel hidden">
          <div id="tbl-pembayaran" class="space-y-4">
            <div class="animate-skeleton bg-charcoal-100 dark:bg-charcoal-800 h-40 rounded-2xl"></div>
          </div>
        </div>

        <!-- ══ TAB: ONGKOS KIRIM ══ -->
        <div id="tab-ongkir" class="tab-panel hidden">
          <div class="flex justify-end mb-5">
            <button id="btn-tambah-ongkir" class="btn-primary px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Tambah Tarif
            </button>
          </div>
          <div id="tbl-ongkir" class="bg-white dark:bg-charcoal-900 rounded-2xl shadow-card overflow-hidden">
            <div class="animate-skeleton bg-charcoal-100 dark:bg-charcoal-800 h-64 rounded-2xl"></div>
          </div>
        </div>

        <!-- ══ TAB: CHATBOT FAQ ══ -->
        <div id="tab-chatbot" class="tab-panel hidden">
          <div class="flex justify-end mb-5">
            <button id="btn-tambah-faq" class="btn-primary px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Tambah FAQ
            </button>
          </div>
          <div id="tbl-faq" class="space-y-3">
            <div class="animate-skeleton bg-charcoal-100 dark:bg-charcoal-800 h-32 rounded-2xl"></div>
          </div>
        </div>

        <!-- ══ TAB: TESTIMONI ══ -->
        <div id="tab-testimoni" class="tab-panel hidden">
          <div class="flex justify-end mb-5">
            <button id="btn-tambah-testimoni" class="btn-primary px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Tambah Testimoni
            </button>
          </div>
          <div id="tbl-testimoni" class="space-y-3">
            <div class="animate-skeleton bg-charcoal-100 dark:bg-charcoal-800 h-32 rounded-2xl"></div>
          </div>
        </div>

        <!-- ══ TAB: LAPORAN ══ -->
        <div id="tab-laporan" class="tab-panel hidden">
          <div class="bg-white dark:bg-charcoal-900 rounded-2xl p-5 shadow-card mb-5">
            <h2 class="font-semibold text-sm mb-4">Filter Laporan</h2>
            <div class="grid sm:grid-cols-3 gap-4">
              <div>
                <label class="label text-xs" for="lap-dari">Dari tanggal</label>
                <input id="lap-dari" type="date" class="input-field w-full">
              </div>
              <div>
                <label class="label text-xs" for="lap-sampai">Sampai tanggal</label>
                <input id="lap-sampai" type="date" class="input-field w-full">
              </div>
              <div>
                <label class="label text-xs" for="lap-status">Status</label>
                <select id="lap-status" class="input-field w-full">
                  <option value="">Semua</option>
                  <option value="lunas">Lunas</option>
                  <option value="menunggu_pembayaran">Menunggu Pembayaran</option>
                  <option value="ditolak">Ditolak</option>
                </select>
              </div>
            </div>
            <div class="flex gap-3 mt-4">
              <button id="btn-export-excel" class="flex items-center gap-2 px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-xl text-sm font-semibold transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                Export Excel
              </button>
              <button id="btn-export-pdf" class="flex items-center gap-2 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-xl text-sm font-semibold transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                </svg>
                Export PDF
              </button>
            </div>
          </div>
          <div id="tbl-laporan" class="bg-white dark:bg-charcoal-900 rounded-2xl shadow-card overflow-hidden">
            <p class="text-center text-sm text-charcoal-400 py-8">Pilih filter lalu klik export</p>
          </div>
        </div>

        <!-- ══ TAB: PENGATURAN ══ -->
        <div id="tab-pengaturan" class="tab-panel hidden">
          <div class="max-w-2xl space-y-5">
            <div class="bg-white dark:bg-charcoal-900 rounded-2xl p-6 shadow-card">
              <h2 class="font-semibold text-sm mb-5">Informasi Toko</h2>
              <div class="space-y-4" id="form-settings">
                <div class="animate-skeleton bg-charcoal-100 dark:bg-charcoal-800 h-40 rounded-xl"></div>
              </div>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- ── Modal (shared) ── -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div id="modal-box" class="bg-white dark:bg-charcoal-900 rounded-2xl shadow-dialog w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between p-5 border-b border-charcoal-100 dark:border-charcoal-800">
        <h2 id="modal-title" class="font-semibold"></h2>
        <button id="modal-close" aria-label="Tutup modal"
          class="p-2 rounded-xl hover:bg-charcoal-100 dark:hover:bg-charcoal-800 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
