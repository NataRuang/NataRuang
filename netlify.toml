# netlify.toml — Konfigurasi deploy NataRuang ke Netlify

[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── Redirects ──────────────────────────────────────────────

# Halaman produk dengan slug (SPA-style routing)
[[redirects]]
  from   = "/produk/:slug"
  to     = "/produk.html"
  status = 200

# Catch-all untuk SPA (harus paling bawah)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security Headers ───────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy   = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://esm.sh;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https://*.supabase.co https://images.unsplash.com;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co;
      frame-src https://www.google.com https://maps.google.com;
    """

# Cache aset statis
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
